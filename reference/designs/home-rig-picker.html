<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MakerLab — Open a rig</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700&family=Space+Grotesk:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* MakerMods design system tokens (frontend/src/index.css) — dark first, like the app's Cursor-style welcome */
  :root {
    --background: #0A0A0A;
    --foreground: #F5F5F5;
    --card: #141414;
    --border: #262626;
    --input: #404040;
    --muted-fg: #A3A3A3;
    --accent: #262626;
    --brand: #FF7A40;
    --brand-fg: #0A0A0A;
    --brand-hover: #FF9460;
    --brand-tint: #3A1F12;
    --ok: #22C55E;
    --warn: #F59E0B;
    --shadow-2: 0 4px 12px rgba(0,0,0,.6), 0 2px 4px rgba(0,0,0,.4);
    --arm-color: #C8C8C8;
    --logo-filter: none;
    --notch-sm: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
    --notch-md: polygon(14px 0, 100% 0, 100% calc(100% - 14px), calc(100% - 14px) 100%, 0 100%, 0 14px);
  }
  @media (prefers-color-scheme: light) {
    :root {
      --background: #FAFAFA;
      --foreground: #0A0A0A;
      --card: #FFFFFF;
      --border: #E5E5E5;
      --input: #D4D4D4;
      --muted-fg: #737373;
      --accent: #E5E5E5;
      --brand: #FF6B2C;
      --brand-fg: #0A0A0A;
      --brand-hover: #E55418;
      --brand-tint: #FFE3D2;
      --ok: #16A34A;
      --warn: #D97706;
      --shadow-2: 0 4px 12px rgba(10,10,10,.08), 0 2px 4px rgba(10,10,10,.04);
      --arm-color: #4A4A4A;
      --logo-filter: brightness(0);
    }
  }

  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; }
  body {
    background: var(--background);
    color: var(--foreground);
    font-family: "Space Grotesk", system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.4;
    -webkit-font-smoothing: antialiased;
    display: grid;
    place-items: center;
    overflow-x: hidden;
  }
  .display { font-family: "Chakra Petch", system-ui, sans-serif; }
  .mono { font-family: "JetBrains Mono", ui-monospace, Menlo, monospace; }

  .home {
    width: min(720px, calc(100vw - 32px));
    padding: 28px 0 64px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ---- hero: the SO-101 stands directly on the page ---- */
  .stage {
    position: relative;
    width: min(720px, 100vw);
    height: 320px;
  }
  .stage canvas {
    width: 100%;
    height: 100%;
    display: block;
    /* radial fade grounds the robot on the page — no card, no border */
    -webkit-mask-image: radial-gradient(ellipse 62% 78% at 50% 52%, #000 55%, transparent 100%);
    mask-image: radial-gradient(ellipse 62% 78% at 50% 52%, #000 55%, transparent 100%);
  }
  .stage .fallback {
    position: absolute; inset: 0;
    display: none;
    place-items: center;
    color: var(--muted-fg);
    font-size: 12px;
    letter-spacing: .08em;
  }
  .stage.failed canvas { display: none; }
  .stage.failed .fallback { display: grid; }

  /* ---- identity ---- */
  .identity { margin-top: 6px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .wordmark { display: flex; align-items: center; gap: 10px; }
  .wordmark img { height: 22px; width: auto; filter: var(--logo-filter); }
  .wordmark span {
    font-family: "Chakra Petch", sans-serif;
    font-weight: 700;
    font-size: 19px;
    letter-spacing: .06em;
  }
  .subline { color: var(--muted-fg); font-size: 12.5px; }
  .subline a { color: var(--muted-fg); text-decoration: none; border-bottom: 1px solid transparent; }
  .subline a:hover { color: var(--foreground); }
  .subline .sep { margin: 0 7px; opacity: .5; }

  /* ---- actions ---- */
  .actions { display: flex; gap: 10px; margin-top: 26px; width: 100%; justify-content: center; }
  .action {
    flex: 0 1 176px;
    background: var(--card);
    border: 1px solid var(--border);
    clip-path: var(--notch-sm);
    padding: 12px 14px 11px;
    display: flex; flex-direction: column; gap: 8px;
    cursor: pointer;
    color: var(--foreground);
    font: inherit;
    text-align: left;
    transition: border-color .15s, background .15s;
  }
  .action:hover { border-color: var(--input); background: var(--accent); }
  .action:focus-visible, .row:focus-visible, .btn:focus-visible, .icon-btn:focus-visible {
    outline: 2px solid var(--brand);
    outline-offset: 1px;
  }
  .action svg { width: 16px; height: 16px; stroke: var(--muted-fg); }
  .action:hover svg { stroke: var(--brand); }
  .action b { font-weight: 500; font-size: 13.5px; }

  /* ---- recent rigs ---- */
  .recents { width: 100%; max-width: 560px; margin-top: 34px; }
  .recents-head { display: flex; justify-content: space-between; align-items: baseline; padding: 0 10px 8px; }
  .eyebrow {
    font-family: "Chakra Petch", sans-serif;
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .14em;
    color: var(--muted-fg);
  }
  .view-all { color: var(--muted-fg); font-size: 12.5px; text-decoration: none; }
  .view-all:hover { color: var(--foreground); }

  .row {
    width: 100%;
    display: grid;
    grid-template-columns: 14px 1fr auto;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    background: none; border: 0; color: inherit; font: inherit;
    cursor: pointer;
    border-radius: 4px;
  }
  .row:hover { background: var(--accent); }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ok); justify-self: center; }
  .dot.warn { background: var(--warn); }
  .row-name { display: flex; align-items: center; gap: 8px; font-weight: 500; font-size: 13.5px; text-align: left; }
  .tag {
    font-family: "JetBrains Mono", monospace;
    font-size: 9.5px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--muted-fg);
    border: 1px solid var(--border);
    padding: 1.5px 5px;
  }
  .row-meta { font-family: "JetBrains Mono", monospace; font-size: 11px; color: var(--muted-fg); }

  .hints { margin-top: 44px; font-family: "JetBrains Mono", monospace; font-size: 11px; color: var(--muted-fg); opacity: .75; }
  .hints kbd { font: inherit; border: 1px solid var(--border); padding: 1px 5px; border-radius: 3px; margin-right: 2px; }

  /* ---- rig settings drawer (the robot config surface) ---- */
  .scrim {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.45);
    opacity: 0; pointer-events: none;
    transition: opacity .22s;
  }
  .drawer {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: min(420px, 100vw);
    background: var(--card);
    border-left: 1px solid var(--border);
    box-shadow: var(--shadow-2);
    transform: translateX(102%);
    transition: transform .26s cubic-bezier(.32,.72,.24,1);
    display: flex; flex-direction: column;
    overflow-y: auto;
  }
  body.drawer-open .scrim { opacity: 1; pointer-events: auto; }
  body.drawer-open .drawer { transform: none; }

  .drawer-head { padding: 20px 22px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; }
  .drawer-head h2 { font-family: "Chakra Petch", sans-serif; font-size: 17px; font-weight: 700; letter-spacing: .02em; margin-top: 2px; }
  .icon-btn { background: none; border: 0; color: var(--muted-fg); cursor: pointer; font-size: 16px; padding: 4px 6px; }
  .icon-btn:hover { color: var(--foreground); }

  .drawer-body { padding: 6px 22px 20px; flex: 1; }
  .field-group { padding: 15px 0 17px; border-bottom: 1px solid var(--border); }
  .field-group:last-child { border-bottom: 0; }
  .field-group .eyebrow { margin-bottom: 10px; display: block; }
  .field-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
  .field-row:first-of-type { margin-top: 0; }
  .field-label { width: 74px; flex: none; font-size: 12.5px; color: var(--muted-fg); }
  .field-input {
    flex: 1; min-width: 0;
    background: var(--background);
    border: 1px solid var(--input);
    color: var(--foreground);
    font-family: "JetBrains Mono", monospace; font-size: 11.5px;
    padding: 7px 9px;
  }
  select.field-input { font-family: "Space Grotesk", sans-serif; font-size: 12.5px; }
  .btn {
    background: var(--card);
    border: 1px solid var(--input);
    color: var(--foreground);
    font: inherit; font-size: 12px;
    padding: 7px 10px;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn:hover { background: var(--accent); }
  .cam-row { display: flex; align-items: center; gap: 9px; margin-top: 8px; font-size: 12.5px; }
  .cam-row .row-meta { margin-left: auto; }
  .power { display: flex; align-items: center; gap: 12px; }
  .power input[type=range] { flex: 1; accent-color: var(--brand); }
  .power output { font-family: "JetBrains Mono", monospace; font-size: 11.5px; color: var(--muted-fg); width: 38px; }

  .drawer-foot {
    padding: 16px 22px 20px;
    border-top: 1px solid var(--border);
    display: flex; gap: 10px; justify-content: flex-end;
    background: var(--card);
  }
  .btn-brand {
    background: var(--brand);
    border: 0;
    color: var(--brand-fg);
    font-family: "Chakra Petch", sans-serif; font-weight: 600; font-size: 13px; letter-spacing: .02em;
    padding: 10px 18px;
    clip-path: var(--notch-sm);
    cursor: pointer;
  }
  .btn-brand:hover { background: var(--brand-hover); }

  /* ---- load-in ---- */
  @media (prefers-reduced-motion: no-preference) {
    .rise { opacity: 0; transform: translateY(10px); animation: rise .5s cubic-bezier(.22,.61,.36,1) forwards; }
    .stage.rise { animation-delay: .05s; }
    .identity.rise { animation-delay: .18s; }
    .actions.rise { animation-delay: .28s; }
    .recents.rise { animation-delay: .38s; }
    .hints.rise { animation-delay: .5s; }
    @keyframes rise { to { opacity: 1; transform: none; } }
  }
  @media (prefers-reduced-motion: reduce) {
    .drawer, .scrim { transition: none; }
  }

  @media (max-width: 560px) {
    .actions { flex-direction: column; align-items: stretch; padding: 0 10px; }
    .action { flex: none; }
    .stage { height: 240px; }
    .row-meta { display: none; }
  }
</style>
</head>
<body>

<main class="home">
  <div class="stage rise" id="stage">
    <canvas id="c" aria-label="SO-101 robot arm"></canvas>
    <div class="fallback mono">SO-101</div>
  </div>

  <header class="identity rise">
    <div class="wordmark">
      <img src="/frontend/public/makermods/logo-mark-white.png" alt="">
      <span>MAKERLAB</span>
    </div>
    <p class="subline">SO-101 workbench<span class="sep">·</span><a href="#">Settings</a></p>
  </header>

  <nav class="actions rise" aria-label="Start">
    <button class="action">
      <svg viewBox="0 0 16 16" fill="none" stroke-width="1.5"><path d="M8 3.5v9M3.5 8h9"/></svg>
      <b>New rig</b>
    </button>
    <a class="action" href="market.html" style="text-decoration:none">
      <svg viewBox="0 0 16 16" fill="none" stroke-width="1.5"><path d="M8 2.5v8m0 0 3-3m-3 3-3-3M3 13.5h10"/></svg>
      <b>Import from Hub</b>
    </a>
    <a class="action" href="market.html" style="text-decoration:none">
      <svg viewBox="0 0 16 16" fill="none" stroke-width="1.5"><rect x="2.5" y="2.5" width="4.6" height="4.6"/><rect x="8.9" y="2.5" width="4.6" height="4.6"/><rect x="2.5" y="8.9" width="4.6" height="4.6"/><rect x="8.9" y="8.9" width="4.6" height="4.6"/></svg>
      <b>Browse Market</b>
    </a>
  </nav>

  <section class="recents rise" aria-label="Recent rigs">
    <div class="recents-head">
      <span class="eyebrow">Recent rigs</span>
      <a class="view-all" href="#">View all (6)</a>
    </div>
    <button class="row" data-open-drawer>
      <span class="dot"></span>
      <span class="row-name">bench-rig <span class="tag">single</span></span>
      <span class="row-meta">/dev/tty.usbmodem101 · 2 cams</span>
    </button>
    <button class="row" data-open-drawer>
      <span class="dot"></span>
      <span class="row-name">dual-desk <span class="tag">bimanual</span></span>
      <span class="row-meta">4 arms · 3 cams</span>
    </button>
    <button class="row" data-open-drawer>
      <span class="dot warn"></span>
      <span class="row-name">travel-arm <span class="tag">single</span></span>
      <span class="row-meta">needs calibration</span>
    </button>
    <button class="row" data-open-drawer>
      <span class="dot"></span>
      <span class="row-name">classroom-01 <span class="tag">single</span></span>
      <span class="row-meta">/dev/tty.usbmodem205 · 1 cam</span>
    </button>
    <button class="row" data-open-drawer>
      <span class="dot warn"></span>
      <span class="row-name">squirrel-rig <span class="tag">bimanual</span></span>
      <span class="row-meta">right follower port missing</span>
    </button>
  </section>

  <p class="hints rise"><kbd>↵</kbd> open rig <span class="sep">·</span> <kbd>⌘N</kbd> new rig <span class="sep">·</span> <kbd>⌘,</kbd> settings</p>
</main>

<div class="scrim" data-close-drawer></div>
<aside class="drawer" aria-label="Rig settings">
  <div class="drawer-head">
    <div>
      <span class="eyebrow">Rig settings</span>
      <h2>bench-rig</h2>
    </div>
    <button class="icon-btn" data-close-drawer aria-label="Close">✕</button>
  </div>
  <div class="drawer-body">
    <div class="field-group">
      <span class="eyebrow">Ports</span>
      <div class="field-row">
        <span class="field-label">Leader</span>
        <input class="field-input" value="/dev/tty.usbmodem101">
        <button class="btn">Detect</button>
      </div>
      <div class="field-row">
        <span class="field-label">Follower</span>
        <input class="field-input" value="/dev/tty.usbmodem102">
        <button class="btn">Detect</button>
      </div>
    </div>
    <div class="field-group">
      <span class="eyebrow">Calibration</span>
      <div class="field-row">
        <span class="field-label">Leader</span>
        <select class="field-input"><option>bench-leader-2026-06.json</option><option>+ Calibrate now…</option></select>
      </div>
      <div class="field-row">
        <span class="field-label">Follower</span>
        <select class="field-input"><option>bench-follower-2026-06.json</option><option>+ Calibrate now…</option></select>
      </div>
    </div>
    <div class="field-group">
      <span class="eyebrow">Cameras</span>
      <div class="cam-row"><span class="dot"></span> front <span class="row-meta">1280×720 · 30 fps</span></div>
      <div class="cam-row"><span class="dot"></span> wrist <span class="row-meta">640×480 · 30 fps</span></div>
      <div class="field-row"><button class="btn" style="width:100%">+ Add camera</button></div>
    </div>
    <div class="field-group">
      <span class="eyebrow">Motor power</span>
      <div class="power">
        <input type="range" min="10" max="100" value="80" oninput="this.nextElementSibling.value=this.value+'%'">
        <output>80%</output>
      </div>
    </div>
  </div>
  <div class="drawer-foot">
    <button class="btn" data-close-drawer>Save</button>
    <a class="btn-brand" href="collect.html" style="text-decoration:none">Open rig →</a>
  </div>
</aside>

<script>
  // drawer (visual only)
  document.addEventListener('click', (e) => {
    if (e.target.closest('[data-open-drawer]')) document.body.classList.add('drawer-open');
    if (e.target.closest('[data-close-drawer]')) document.body.classList.remove('drawer-open');
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') document.body.classList.remove('drawer-open');
  });
</script>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.177.0/build/three.module.js",
    "three/examples/jsm/": "https://unpkg.com/three@0.177.0/examples/jsm/",
    "urdf-loader": "https://unpkg.com/urdf-loader@0.12.6/src/URDFLoader.js"
  }
}
</script>
<script type="module">
  const stage = document.getElementById('stage');
  try {
    const THREE = await import('three');
    const { default: URDFLoader } = await import('urdf-loader');

    const canvas = document.getElementById('c');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(30, 1, 0.01, 20);
    camera.position.set(0.5, 0.3, 0.62);
    camera.lookAt(0, 0.15, 0);

    const dark = matchMedia('(prefers-color-scheme: dark)').matches !== false && !matchMedia('(prefers-color-scheme: light)').matches;
    const armColor = new THREE.Color(dark ? 0xc8c8c8 : 0x4a4a4a);

    // lights: quiet key + orange rim from behind-left (the brand accent lives in light, not paint)
    scene.add(new THREE.AmbientLight(0xffffff, dark ? 0.55 : 0.9));
    const key = new THREE.DirectionalLight(0xffffff, dark ? 1.6 : 2.2);
    key.position.set(1.2, 1.8, 1.4);
    scene.add(key);
    const rim = new THREE.DirectionalLight(0xff7a40, dark ? 2.4 : 1.2);
    rim.position.set(-1.6, 0.7, -1.2);
    scene.add(rim);

    // ground grid — masked radially by CSS so it reads as a fading disc
    const grid = new THREE.GridHelper(3, 42, 0xff7a40, dark ? 0x2a2a2a : 0xd9d9d9);
    grid.material.transparent = true;
    grid.material.opacity = dark ? 0.5 : 0.7;
    scene.add(grid);

    const loader = new URDFLoader();
    loader.packages = { so_arm_description: '/frontend/public/so-101-urdf' };
    const robot = await new Promise((res, rej) => {
      loader.load('/frontend/public/so-101-urdf/urdf/so101_new_calib.urdf', res, undefined, rej);
    });

    robot.rotation.x = -Math.PI / 2;  // URDF z-up → three y-up
    scene.add(robot);

    // meshes attach async after the URDF parses — re-skin until they're all ours
    const armMat = new THREE.MeshStandardMaterial({ color: armColor, metalness: 0.25, roughness: 0.55 });
    const skin = () => robot.traverse((o) => { if (o.isMesh && o.material !== armMat) o.material = armMat; });

    const J = (n, v) => robot.joints[n] && robot.joints[n].setJointValue(v);
    const pose = (t) => {
      J('Rotation',    0.38 * Math.sin(t * 0.40));
      J('Pitch',      -0.28 + 0.08 * Math.sin(t * 0.60 + 1.2));
      J('Elbow',       0.62 + 0.10 * Math.sin(t * 0.52 + 0.4));
      J('Wrist_Pitch', 0.92 + 0.14 * Math.sin(t * 0.70 + 2.1));
      J('Wrist_Roll',  0.30 * Math.sin(t * 0.33));
      J('Jaw',         0.30 + 0.26 * Math.sin(t * 0.90 + 3.0));
    };

    const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
    const resize = () => {
      const w = stage.clientWidth, h = stage.clientHeight;
      renderer.setSize(w, h, false);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    };
    addEventListener('resize', () => { resize(); if (reduced) renderer.render(scene, camera); });
    resize();

    if (reduced) {
      pose(2.1);
      setTimeout(() => { skin(); renderer.render(scene, camera); }, 300);
      setTimeout(() => { skin(); renderer.render(scene, camera); }, 1500);
      renderer.render(scene, camera);
    } else {
      renderer.setAnimationLoop((ms) => {
        skin();
        pose(ms / 1000);
        renderer.render(scene, camera);
      });
    }
  } catch (err) {
    stage.classList.add('failed');
    console.warn('[home] 3D hero unavailable:', err);
  }
</script>
</body>
</html>
